name: Automated Preprocessing

on:
  push:
    branches:
      - main
      - master
    paths:
      - "src/**"
      - "data/raw/**"
      - ".github/workflows/preprocessing.yml"
  pull_request:
    branches:
      - main
      - master
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  preprocess:
    name: Run Preprocessing Pipeline
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repository ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Python ─────────────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      # ── 3. Install dependensi ───────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Download dataset dari Kaggle ─────────────────────────────────────
      - name: Download dataset from Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.data }}
          KAGGLE_KEY:      ${{ secrets.fmkviergv938rjgvierfd }}
        run: |
          mkdir -p data/raw
          kaggle datasets download \
            -d yudhaislamisulistya/plants-type-datasets \
            -p data/raw \
            --unzip
          echo "Dataset downloaded:"
          ls -lh data/raw/

      # ── 5. Jalankan skrip preprocessing ─────────────────────────────────────
      - name: Run preprocessing script
        run: |
          python src/automate_Nama-siswa.py \
            --dataset_path "data/raw/split_ttv_dataset_type_of_plants" \
            --output_dir   "data/processed" \
            --target_size  128 128

      # ── 6. Verifikasi output ─────────────────────────────────────────────────
      - name: Verify processed output
        run: |
          echo "=== Isi direktori data/processed ==="
          ls -lh data/processed/
          python - <<'EOF'
          import os, numpy as np
          out_dir = "data/processed"
          for f in sorted(os.listdir(out_dir)):
              fpath = os.path.join(out_dir, f)
              if f.endswith(".npy"):
                  arr = np.load(fpath)
                  print(f"{f:<25}  shape={arr.shape}  dtype={arr.dtype}")
              else:
                  print(f"{f}")
          EOF

      # ── 7. Upload artifact processed (opsional – 7 hari retensi) ────────────
      - name: Upload processed data as artifact
        uses: actions/upload-artifact@v4
        with:
          name: processed-dataset-${{ github.run_number }}
          path: data/processed/
          retention-days: 7